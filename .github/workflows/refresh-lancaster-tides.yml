name: Refresh Lancaster Tides

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    env:
      SEO_SITE_URL: https://rivercleanup.co.uk
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate required Supabase secrets
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ] || [ -z "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "Missing required Supabase secrets. Set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY in repository secrets."
            exit 1
          fi

      - name: Write .env.production for Vite build
        run: |
          cat <<EOF > .env.production
          VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
          VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
          SEO_SITE_URL=${SEO_SITE_URL}
          EOF

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Lancaster tide JSON
        run: npm run update:tides

      - name: Build site
        run: npm run build

      - name: Deploy to GitHub Pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx gh-pages -d dist -u "github-actions <github-actions@users.noreply.github.com>" -r "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"