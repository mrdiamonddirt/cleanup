<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Redirecting | River Bank Cleanup Tracker</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f8fafc;
        color: #0f172a;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 640px;
        padding: 24px;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.4rem;
      }

      p {
        margin: 0 0 14px;
        line-height: 1.5;
      }

      a {
        color: #0f172a;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redirecting to the tracker</h1>
      <p id="message">If this page does not move automatically, use the link below.</p>
      <p><a id="fallback-link" href="/">Open River Bank Cleanup Tracker</a></p>
    </main>
    <script>
      (function () {
        var pathname = window.location.pathname || "/";
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        var segments = pathname.replace(/^\/+|\/+$/g, "").split("/").filter(Boolean);
        var redirectUrl = "/";
        var message = "The requested page could not be found. Redirecting to the tracker homepage.";

        var decodeSegment = function (value) {
          try {
            return decodeURIComponent(value || "");
          } catch {
            return value || "";
          }
        };

        if (segments.length >= 2 && segments[0] === "share") {
          var itemId = decodeSegment(segments[1]);
          var shareParams = new URLSearchParams(search);
          shareParams.set("item", itemId);
          redirectUrl = "/?" + shareParams.toString() + hash;
          message = "This share page was not pre-generated. Redirecting to the live item in the tracker.";
        } else if (segments.length >= 2 && segments[0] === "poi") {
          var poiSlug = decodeSegment(segments[1]);
          var poiParams = new URLSearchParams(search);
          poiParams.set("poi", poiSlug);
          redirectUrl = "/?" + poiParams.toString() + hash;
          message = "This POI page was not pre-generated. Redirecting to the live map entry.";
        }

        var messageNode = document.getElementById("message");
        if (messageNode) {
          messageNode.textContent = message;
        }

        var fallbackLink = document.getElementById("fallback-link");
        if (fallbackLink) {
          fallbackLink.href = redirectUrl;
        }

        window.location.replace(redirectUrl);
      })();
    </script>
  </body>
</html>
